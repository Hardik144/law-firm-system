apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: lawfirm/frontend:latest
          env:
            - name: VITE_API_BASE_URL
              value: http://backend:4000/api
          ports:
            - containerPort: 5173

